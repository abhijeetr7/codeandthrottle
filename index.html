<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE & THROTTLE | KTM Duke 250</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #FF6A00; }
        body { background-color: #0A0A0A; color: white; margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { display: none; }

        /* --- Animations --- */
        @keyframes driveIn { 0% { transform: translateX(-150vw); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes engineVibrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        @keyframes smokeFade { 0% { transform: translate(0, 0) scale(0.5); opacity: 0.6; } 100% { transform: translate(-80px, -40px) scale(2.5); opacity: 0; } }
        @keyframes roadSlide { from { background-position: 0 0; } to { background-position: -200px 0; } }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .bike-entry { animation: driveIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .bike-vibration { animation: engineVibrate 0.1s infinite linear; }
        .animate-reveal { animation: reveal 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; opacity: 0; }
        .delay-200 { animation-delay: 0.2s; }
        
        .smoke-particle { position: absolute; background: rgba(150, 150, 150, 0.4); border-radius: 50%; filter: blur(10px); pointer-events: none; z-index: 5; animation: smokeFade 0.7s ease-out forwards; }
        .road-line { background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%); background-size: 200px 100%; animation: roadSlide 0.5s infinite linear; opacity: 0.3; }
        .glow-cursor { pointer-events: none; position: fixed; inset: 0; z-index: 9999; background: radial-gradient(600px at var(--x, 0px) var(--y, 0px), rgba(255, 106, 0, 0.1), transparent); }
        .primary-text { color: var(--primary); }
        .primary-bg { background-color: var(--primary); }

        /* --- Rider Hub Scroll --- */
        #hubGrid { display: flex; overflow-x: auto; gap: 1.5rem; padding-bottom: 2rem; scroll-snap-type: x mandatory; }
        #hubGrid::-webkit-scrollbar { height: 4px; display: block; }
        #hubGrid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .snap-item { scroll-snap-align: start; flex: 0 0 300px; }

        /* Initial state of main content */
        #mainContent { opacity: 0; visibility: hidden; transition: opacity 1s ease; }
        #infoModal { display: none; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <div class="glow-cursor" id="cursorGlow"></div>

    <div id="startupOverlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-all duration-1000">
        <div class="relative group cursor-pointer" onclick="startEngine()">
            <div class="absolute -inset-4 bg-[#FF6A00] rounded-full blur-xl opacity-20 group-hover:opacity-60 transition-all duration-500 animate-pulse"></div>
            <button class="relative w-32 h-32 rounded-full border-2 border-[#FF6A00] flex items-center justify-center">
                <span class="text-[#FF6A00] font-bold tracking-widest text-[10px] uppercase">Start Engine</span>
            </button>
        </div>
    </div>

    <div id="mainContent">
        <nav class="fixed top-0 w-full z-50 px-6 py-8 flex justify-between items-center mix-blend-difference">
            <div class="text-2xl font-black tracking-tighter italic uppercase">CODE<span class="primary-text">&</span>THROTTLE</div>
            <div class="flex items-center gap-8">
                <div class="hidden md:flex gap-6 text-[10px] uppercase tracking-[0.2em] font-medium text-zinc-400">
                    <a href="#machine" class="hover:text-white transition-colors">Machine</a>
                    <a href="#feed" class="hover:text-white transition-colors">Feed</a>
                    <a href="#hub" class="hover:text-white transition-colors">Hub</a>
                </div>
                <button onclick="toggleRideMode()" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-md flex items-center gap-3 active:scale-95 transition-all">
                    <div id="modeIndicator" class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span id="modeText" class="text-[10px] font-bold uppercase tracking-widest">STREET MODE</span>
                </button>
            </div>
        </nav>

        <section class="relative h-screen flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#0A0A0A]/60 to-[#0A0A0A]"></div>
                <img src="https://images.unsplash.com/photo-1558981403-c5f91cbba527?auto=format&fit=crop&w=2070" class="w-full h-full object-cover scale-110 opacity-30 mix-blend-luminosity">
            </div>
            <div class="relative z-10 flex flex-col items-center">
                <div id="bikeWrapper" class="relative">
                    <div id="smokeContainer" class="absolute inset-0 pointer-events-none"></div>
                    <img id="mainBike" src="250duke-metalic-silver-webp.webp" class="w-full max-w-[550px] h-auto drop-shadow-[0_30px_60px_rgba(0,0,0,0.8)]">
                    <div id="roadEffect" class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-[80%] h-[2px] road-line hidden"></div>
                </div>
                <div class="mt-10 text-center">
                    <h1 class="text-6xl md:text-9xl font-black tracking-tighter uppercase italic leading-none">
                        <span class="block animate-reveal text-zinc-200">DEBUG THE</span>
                        <span class="block animate-reveal delay-200 primary-text">LIMITS</span>
                    </h1>
                </div>
            </div>
        </section>

        <section id="machine" class="py-32 px-6 max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold italic uppercase tracking-tighter mb-12">Machine Intelligence</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-zinc-900 border border-white/5 rounded-3xl p-8 relative overflow-hidden">
                        <h3 class="text-xs font-bold text-zinc-500 mb-1 uppercase tracking-widest">Max Torque</h3>
                        <div class="text-4xl font-black italic mb-8">25 NM</div>
                        <svg class="w-full h-24" viewBox="0 0 400 100">
                            <path d="M10,80 Q200,80 390,80" stroke="#222" stroke-width="8" fill="none" />
                            <path id="torqueLine" d="M10,80 Q200,80 390,80" stroke="#FF6A00" stroke-width="8" fill="none" stroke-dasharray="400" stroke-dashoffset="400" class="transition-all duration-1000" />
                        </svg>
                    </div>
                    <div class="bg-zinc-900 border border-white/5 rounded-3xl p-8">
                        <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">Top Speed</h3>
                        <div class="text-6xl font-black italic mb-4"><span id="speedDisplay">0</span> KM/H</div>
                        <div class="w-full bg-zinc-800 h-1.5 rounded-full overflow-hidden">
                            <div id="speedBar" class="h-full bg-orange-600 transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="primary-bg rounded-3xl p-8 flex flex-col justify-between text-black">
                    <h3 class="text-3xl font-black italic uppercase leading-tight">Gearbox Logic</h3>
                    <div class="flex gap-2 my-8" id="gearContainer"></div>
                    <button onclick="cycleGear()" class="w-full py-4 bg-black text-white font-black uppercase tracking-widest rounded-xl active:scale-95 transition-all">Shift Gear</button>
                </div>
            </div>
        </section>

        <section id="feed" class="py-32 px-6 max-w-7xl mx-auto">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-12">The Feed</h2>
            <div id="feedGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </section>

        <section id="hub" class="py-32 px-6 max-w-7xl mx-auto border-t border-white/5">
            <div class="flex items-center justify-between mb-12">
                <h2 class="text-4xl font-black italic uppercase tracking-tighter">Rider Hub</h2>
                <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Scroll Right →</span>
            </div>
            <div id="hubGrid">
                </div>
        </section>

        <footer class="py-20 text-center text-zinc-700 text-[10px] uppercase tracking-[0.5em] font-bold">Code & Throttle // Ready To Race</footer>
    </div>

    <div id="infoModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-white/10 p-10 rounded-3xl max-w-lg w-full relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-zinc-500 hover:text-white text-2xl">✕</button>
            <div id="modalIcon" class="text-5xl mb-6"></div>
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase primary-text mb-4"></h2>
            <p id="modalDesc" class="text-zinc-400 leading-relaxed"></p>
        </div>
    </div>

    <script>
        let state = { speed: 0, gear: 1, isStreet: true };

        function startEngine() {
            document.getElementById('startupOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startupOverlay').style.display = 'none';
                const main = document.getElementById('mainContent');
                main.style.visibility = 'visible';
                main.style.opacity = '1';
                
                const bike = document.getElementById('bikeWrapper');
                bike.classList.add('bike-entry');
                document.getElementById('mainBike').classList.add('bike-vibration');
                document.getElementById('roadEffect').classList.remove('hidden');
                
                animateMachine();
            }, 1000);
        }

        function cycleGear() {
            state.gear = state.gear >= 6 ? 1 : state.gear + 1;
            renderGears();
        }

        function renderGears() {
            const container = document.getElementById('gearContainer'); container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const active = i === state.gear;
                container.innerHTML += `<div class="flex-1 h-12 rounded-xl border-2 border-black/20 flex items-center justify-center font-black ${active ? 'bg-black text-white scale-110' : 'text-black/30'}">${i}</div>`;
            }
        }

        function animateMachine() {
            document.getElementById('torqueLine').style.strokeDashoffset = '0';
            let interval = setInterval(() => {
                if (state.speed < 148) {
                    state.speed++;
                    document.getElementById('speedDisplay').innerText = state.speed;
                    document.getElementById('speedBar').style.width = (state.speed / 148 * 100) + '%';
                    if (state.speed % 2 === 0) spawnSmoke();
                } else clearInterval(interval);
            }, 30);
        }

        function spawnSmoke() {
            const container = document.getElementById('smokeContainer');
            const smoke = document.createElement('div');
            smoke.className = 'smoke-particle';
            smoke.style.width = smoke.style.height = (Math.random() * 20 + 10) + 'px';
            smoke.style.left = '20%'; smoke.style.bottom = '15%'; 
            container.appendChild(smoke);
            setTimeout(() => smoke.remove(), 700);
        }

        function renderFeed() {
            const grid = document.getElementById('feedGrid');
            const images = [
                'https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?auto=format&fit=crop&w=600&q=80',
                'https://images.unsplash.com/photo-1558981806-ec527fa84c39?auto=format&fit=crop&w=600&q=80',
                'https://images.unsplash.com/photo-1622185135505-2d795003994a?auto=format&fit=crop&w=600&q=80',
                'https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?auto=format&fit=crop&w=600&q=80'
            ];
            images.forEach(img => {
                grid.innerHTML += `
                    <div class="aspect-[4/5] bg-zinc-900 rounded-2xl overflow-hidden grayscale hover:grayscale-0 transition-all duration-500">
                        <img src="${img}" class="w-full h-full object-cover">
                    </div>`;
            });
        }

        const hubTips = [
            { icon: '⚙️', title: 'Break-in', desc: 'Limit RPM to 7,500 for the first 1,000km to seat engine components.' },
            { icon: '🧠', title: 'Slipper Clutch', desc: 'Prevents rear-wheel lock during aggressive downshifts.' },
            { icon: '⛓️', title: 'Chain tension', desc: 'Keep at 5-7mm for optimal torque transfer.' },
            { icon: '🔌', title: 'Ride-by-wire', desc: 'Recalibrates every start for crisp throttle response.' },
            { icon: '🌡️', title: 'Cooling', desc: 'High-efficiency thermal management for urban traffic.' }
        ];

        function renderHub() {
            const grid = document.getElementById('hubGrid');
            hubTips.forEach((tip, i) => {
                grid.innerHTML += `
                    <div onclick="openModal(${i})" class="snap-item p-10 rounded-[40px] bg-zinc-900 border border-white/5 hover:border-[#FF6A00]/50 transition-all cursor-pointer group">
                        <div class="text-4xl mb-6 group-hover:scale-110 transition-transform">${tip.icon}</div>
                        <h3 class="text-xl font-black mb-2 uppercase italic">${tip.title}</h3>
                        <p class="text-zinc-500 text-sm leading-relaxed">${tip.desc}</p>
                    </div>`;
            });
        }

        function openModal(i) {
            const t = hubTips[i];
            document.getElementById('modalIcon').innerText = t.icon;
            document.getElementById('modalTitle').innerText = t.title;
            document.getElementById('modalDesc').innerText = t.desc;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        function toggleRideMode() {
            state.isStreet = !state.isStreet;
            document.getElementById('modeIndicator').className = `w-2 h-2 rounded-full ${state.isStreet ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`;
            document.getElementById('modeText').innerText = state.isStreet ? 'STREET MODE' : 'TRACK MODE';
        }

        window.addEventListener('mousemove', e => {
            document.getElementById('cursorGlow').style.setProperty('--x', e.clientX + 'px');
            document.getElementById('cursorGlow').style.setProperty('--y', e.clientY + 'px');
        });

        renderGears(); renderFeed(); renderHub();
    </script>
</body>
</html>
