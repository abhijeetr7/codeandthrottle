<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE & THROTTLE | KTM Duke 250</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #FF6A00; }
        body { background-color: #0A0A0A; color: white; margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { display: none; }

        /* --- Animations --- */
        @keyframes driveIn { 0% { transform: translateX(-150vw); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes engineVibrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
        @keyframes smokeFade { 0% { transform: translate(0, 0) scale(0.5); opacity: 0.6; } 100% { transform: translate(-80px, -40px) scale(2.5); opacity: 0; } }
        @keyframes roadSlide { from { background-position: 0 0; } to { background-position: -200px 0; } }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse-glow { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        .bike-entry { animation: driveIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .bike-vibration { animation: engineVibrate 0.05s infinite linear; }
        .animate-reveal { animation: reveal 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; opacity: 0; }
        
        .smoke-particle { position: absolute; background: rgba(150, 150, 150, 0.3); border-radius: 50%; filter: blur(12px); pointer-events: none; z-index: 5; animation: smokeFade 0.8s ease-out forwards; }
        .road-line { background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%); background-size: 200px 100%; animation: roadSlide 0.4s infinite linear; opacity: 0.3; }
        .glow-cursor { pointer-events: none; position: fixed; inset: 0; z-index: 9999; background: radial-gradient(600px at var(--x, 0px) var(--y, 0px), rgba(255, 106, 0, 0.08), transparent); }

        /* --- Parallax & Hotspots --- */
        .parallax-text { position: absolute; font-size: 25vw; font-weight: 900; color: transparent; -webkit-text-stroke: 1px rgba(255,106,0,0.15); text-transform: uppercase; white-space: nowrap; pointer-events: none; z-index: 1; transition: transform 0.1s ease-out; }
        .hotspot { position: absolute; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; cursor: pointer; z-index: 20; }
        .hotspot::after { content: ''; position: absolute; inset: -8px; border: 1px solid var(--primary); border-radius: 50%; animation: pulse-glow 2s infinite; }
        .hotspot-label { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); background: black; border: 1px solid var(--primary); padding: 4px 12px; border-radius: 4px; font-size: 10px; font-weight: bold; white-space: nowrap; opacity: 0; transition: 0.3s; pointer-events: none; }
        .hotspot:hover .hotspot-label { opacity: 1; transform: translateY(-50%) translateX(10px); }

        /* --- HUB SCROLL FIX --- */
        #hubGrid { display: flex; overflow-x: auto; gap: 1.5rem; padding-bottom: 2rem; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        #hubGrid::-webkit-scrollbar { height: 4px; display: block; }
        #hubGrid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .snap-item { scroll-snap-align: start; flex: 0 0 300px; }

        #mainContent { opacity: 0; visibility: hidden; transition: opacity 1s ease; }
        #infoModal { display: none; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .primary-bg { background-color: var(--primary); }
        .primary-text { color: var(--primary); }
    </style>
</head>
<body>

    <div class="glow-cursor" id="cursorGlow"></div>

    <div id="startupOverlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-all duration-1000">
        <div class="relative group cursor-pointer" onclick="startEngine()">
            <div class="absolute -inset-4 bg-[#FF6A00] rounded-full blur-xl opacity-20 group-hover:opacity-60 transition-all duration-500 animate-pulse"></div>
            <button class="relative w-32 h-32 rounded-full border-2 border-[#FF6A00] flex items-center justify-center">
                <span class="text-[#FF6A00] font-bold tracking-widest text-[10px] uppercase">Start Engine</span>
            </button>
        </div>
    </div>

    <div id="mainContent">
        <nav class="fixed top-0 w-full z-50 px-6 py-8 flex justify-between items-center mix-blend-difference">
            <div class="text-2xl font-black tracking-tighter italic uppercase">CODE<span class="primary-text">&</span>THROTTLE</div>
            <div class="flex items-center gap-8">
                <div class="hidden md:flex gap-6 text-[10px] uppercase tracking-[0.2em] font-medium text-zinc-400">
                    <a href="#machine" class="hover:text-white transition-colors">Machine</a>
                    <a href="#feed" class="hover:text-white transition-colors">Feed</a>
                    <a href="#hub" class="hover:text-white transition-colors">Hub</a>
                </div>
                <button onclick="toggleRideMode()" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-md flex items-center gap-3 active:scale-95 transition-all">
                    <div id="modeIndicator" class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span id="modeText" class="text-[10px] font-bold uppercase tracking-widest">STREET MODE</span>
                </button>
            </div>
        </nav>

        <section class="relative h-screen flex items-center justify-center overflow-hidden">
            <div class="parallax-text" id="bgText">DUKE</div>
            <div class="absolute inset-0 z-0 opacity-20">
                <img src="https://images.unsplash.com/photo-1558981403-c5f91cbba527?auto=format&fit=crop&q=80&w=2070" class="w-full h-full object-cover">
            </div>

            <div class="relative z-10 flex flex-col items-center">
                <div id="bikeWrapper" class="relative transition-transform duration-300 ease-out">
                    <div id="smokeContainer" class="absolute inset-0 pointer-events-none"></div>
                    
                    <div class="hotspot" style="top: 20%; left: 45%;"><div class="hotspot-label">WP APEX 43 SUSPENSION</div></div>
                    <div class="hotspot" style="top: 55%; left: 55%;"><div class="hotspot-label">TRELLIS FRAME GEN-2</div></div>
                    <div class="hotspot" style="top: 40%; left: 15%;"><div class="hotspot-label">LED HEADLIGHT 2.0</div></div>

                    <img id="mainBike" src="250duke-metalic-silver-webp.webp" class="w-full max-w-[550px] h-auto drop-shadow-[0_40px_80px_rgba(0,0,0,0.9)] transition-transform duration-500">
                    <div id="roadEffect" class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-[80%] h-[2px] road-line hidden"></div>
                </div>
                <div class="mt-10 text-center relative z-20">
                    <h1 class="text-6xl md:text-9xl font-black tracking-tighter uppercase italic leading-none">
                        <span class="block animate-reveal text-zinc-200">DEBUG THE</span>
                        <span class="block animate-reveal primary-text" style="animation-delay: 0.2s">LIMITS</span>
                    </h1>
                </div>
            </div>
        </section>

        <section id="machine" class="py-32 px-6 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-zinc-900/50 border border-white/5 rounded-3xl p-10 relative overflow-hidden">
                        <h3 class="text-xs font-bold text-zinc-500 mb-1 uppercase tracking-widest">Torque Load</h3>
                        <div class="text-4xl font-black italic mb-8">25 NM</div>
                        <svg class="w-full h-24" viewBox="0 0 400 100">
                            <path d="M10,80 Q200,80 390,80" stroke="#222" stroke-width="8" fill="none" />
                            <path id="torqueLine" d="M10,80 Q200,80 390,80" stroke="#FF6A00" stroke-width="8" fill="none" stroke-dasharray="400" stroke-dashoffset="400" />
                        </svg>
                    </div>
                    <div class="bg-zinc-900/50 border border-white/5 rounded-3xl p-10">
                        <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">Velocity</h3>
                        <div class="text-7xl font-black italic mb-4"><span id="speedDisplay">0</span> <span class="text-sm">KM/H</span></div>
                        <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                            <div id="speedBar" class="h-full bg-orange-600" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="primary-bg rounded-3xl p-10 flex flex-col justify-between text-black">
                    <h3 class="text-3xl font-black italic uppercase leading-tight text-black">6-Speed<br>Sequential</h3>
                    <div class="flex gap-2 my-8" id="gearContainer"></div>
                    <button onclick="cycleGear()" class="w-full py-5 bg-black text-white font-black uppercase tracking-widest rounded-2xl active:scale-95 transition-all">Shift Gear</button>
                </div>
            </div>
        </section>

        <section id="feed" class="py-32 px-6 max-w-7xl mx-auto">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-12">The Feed</h2>
            <div id="feedGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>
        
 <!--       <section id="feed" class="py-32 px-6 max-w-7xl mx-auto">
    <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-12">The Feed</h2>
    <div id="feedGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-zinc-900/50 rounded-3xl p-4 border border-white/5 flex justify-center">
             <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DW_KZlcigwT/" data-instgrm-version="14" style="width:100%;"></blockquote>
        </div>

        <div class="bg-zinc-900/50 rounded-3xl p-4 border border-white/5 flex justify-center">
             <blockquote class="instagram-media" data-instgrm-permalink="PASTE_ANOTHER_URL_HERE" data-instgrm-version="14" style="width:100%;"></blockquote>
        </div>

    </div>
</section> -->

        <section id="hub" class="py-32 px-6 max-w-7xl mx-auto border-t border-white/5">
            <div class="flex items-center justify-between mb-12">
                <h2 class="text-4xl font-black italic uppercase tracking-tighter">Rider Hub</h2>
                <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Scroll Right →</span>
            </div>
            <div id="hubGrid"></div>
        </section>

        <footer class="py-20 text-center text-zinc-800 text-[10px] uppercase tracking-[1em] font-black">Code & Throttle // 2026</footer>
    </div>

    <div id="infoModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-white/10 p-10 rounded-3xl max-w-lg w-full relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-zinc-500 hover:text-white text-2xl">✕</button>
            <div id="modalIcon" class="text-5xl mb-6"></div>
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase primary-text mb-4"></h2>
            <p id="modalDesc" class="text-zinc-400 leading-relaxed"></p>
        </div>
    </div>

    <script>
        let state = { speed: 0, gear: 1, isStreet: true };

//function loadInstagramPosts() {
    // 1. Create the Instagram script element
 //   const script = document.createElement('script');
//    script.src = "https://www.instagram.com/embed.js";
//    script.async = true;
//    document.body.appendChild(script);

    // 2. Once the script loads, tell it to process the blockquotes
//    script.onload = () => {
 //       if (window.instgrm) {
//            window.instgrm.Embeds.process();
//        }
//    };
//}
        function startEngine() {
            document.getElementById('startupOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startupOverlay').style.display = 'none';
                const main = document.getElementById('mainContent');
                main.style.visibility = 'visible';
                main.style.opacity = '1';
                document.getElementById('bikeWrapper').classList.add('bike-entry');
                document.getElementById('mainBike').classList.add('bike-vibration');
                document.getElementById('roadEffect').classList.remove('hidden');
                
                //loadInstagramPosts(); // <--- CALL THIS HERE
                animateMachine();
            }, 1000);
        }

        window.addEventListener('mousemove', e => {
            document.getElementById('cursorGlow').style.setProperty('--x', e.clientX + 'px');
            document.getElementById('cursorGlow').style.setProperty('--y', e.clientY + 'px');
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const bike = document.getElementById('mainBike');
            bike.style.transform = `rotateY(${moveX}deg) rotateZ(${moveX/2}deg)`;
        });

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.getElementById('bgText').style.transform = `translateX(${scroll * 0.5}px)`;
        });

        function animateMachine() {
            document.getElementById('torqueLine').style.transition = 'stroke-dashoffset 2s ease-out';
            document.getElementById('torqueLine').style.strokeDashoffset = '0';
            let interval = setInterval(() => {
                if (state.speed < 148) {
                    state.speed++;
                    document.getElementById('speedDisplay').innerText = state.speed;
                    document.getElementById('speedBar').style.width = (state.speed / 148 * 100) + '%';
                    if (state.speed % 3 === 0) spawnSmoke();
                } else clearInterval(interval);
            }, 30);
        }

        function spawnSmoke() {
            const container = document.getElementById('smokeContainer');
            const smoke = document.createElement('div');
            smoke.className = 'smoke-particle';
            smoke.style.width = smoke.style.height = (Math.random() * 20 + 10) + 'px';
            smoke.style.left = '15%'; smoke.style.bottom = '10%'; 
            container.appendChild(smoke);
            setTimeout(() => smoke.remove(), 800);
        }

        function cycleGear() {
            state.gear = state.gear >= 6 ? 1 : state.gear + 1;
            renderGears();
        }

        function renderGears() {
            const container = document.getElementById('gearContainer'); container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const active = i === state.gear;
                container.innerHTML += `<div class="flex-1 h-14 rounded-2xl border border-black/10 flex items-center justify-center font-black transition-all ${active ? 'bg-black text-white scale-110' : 'bg-white/10 text-black/40'}">${i}</div>`;
            }
        }

        function renderFeed() {
            const grid = document.getElementById('feedGrid');
            const images = [
                'https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?auto=format&fit=crop&w=600&q=80',
                'https://images.unsplash.com/photo-1558981806-ec527fa84c39?auto=format&fit=crop&w=600&q=80',
                'https://images.unsplash.com/photo-1622185135505-2d795003994a?auto=format&fit=crop&w=600&q=80',
                'https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?auto=format&fit=crop&w=600&q=80'
            ];
            images.forEach(img => {
                grid.innerHTML += `<div class="aspect-[4/5] bg-zinc-900 rounded-2xl overflow-hidden grayscale hover:grayscale-0 transition-all duration-500"><img src="${img}" class="w-full h-full object-cover"></div>`;
            });
        }

        const hubTips = [
            { icon: '⚙️', title: 'Break-in', desc: 'Limit RPM to 7,500 for the first 1,000km to seat engine components.' },
            { icon: '🧠', title: 'Slipper Clutch', desc: 'Prevents rear-wheel lock during aggressive downshifts.' },
            { icon: '⛓️', title: 'Chain tension', desc: 'Keep at 5-7mm for optimal torque transfer.' },
            { icon: '🔌', title: 'Ride-by-wire', desc: 'Recalibrates every start for crisp throttle response.' },
            { icon: '🌡️', title: 'Cooling', desc: 'High-efficiency thermal management for urban traffic.' }
        ];

        function renderHub() {
            const grid = document.getElementById('hubGrid');
            hubTips.forEach((tip, i) => {
                grid.innerHTML += `<div onclick="openModal(${i})" class="snap-item p-10 rounded-[40px] bg-zinc-900 border border-white/5 hover:border-[#FF6A00]/50 transition-all cursor-pointer group"><div class="text-4xl mb-6 group-hover:scale-110 transition-transform">${tip.icon}</div><h3 class="text-xl font-black mb-2 uppercase italic">${tip.title}</h3><p class="text-zinc-500 text-sm leading-relaxed">${tip.desc}</p></div>`;
            });
        }


        function openModal(i) {
            const t = hubTips[i];
            document.getElementById('modalIcon').innerText = t.icon;
            document.getElementById('modalTitle').innerText = t.title;
            document.getElementById('modalDesc').innerText = t.desc;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        function toggleRideMode() {
            state.isStreet = !state.isStreet;
            document.getElementById('modeIndicator').className = `w-2 h-2 rounded-full ${state.isStreet ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`;
            document.getElementById('modeText').innerText = state.isStreet ? 'STREET MODE' : 'TRACK MODE';
        }

        renderGears(); renderFeed(); renderHub();
    </script>
</body>
</html>
